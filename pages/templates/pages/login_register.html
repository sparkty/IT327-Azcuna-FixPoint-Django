{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in or create an account — FixPoint">
    <title>FixPoint | Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'pages/css/login_register.css' %}">
</head>
<body>
<div class="login-screen-container">

    <nav class="top-nav">
        <div class="top-nav-brand">FIXPOINT</div>
    </nav>

    <div class="content">
        <div class="auth-screen">

            {% include "components/auth_left_panel.html" %}

            <!-- Right Panel -->
            <div class="auth-right">
                <div class="auth-tab-switcher">
                    <button type="button" class="auth-tab-btn {% if active_tab == 'login' %}active{% endif %}" data-tab="login">LOGIN</button>
                    <button type="button" class="auth-tab-btn {% if active_tab == 'register' %}active{% endif %}" data-tab="register">REGISTER</button>
                </div>


                {% include "components/auth_login_form.html" %}
                {% include "components/auth_forgot_form.html" %}
                {% include "components/auth_reset_form.html" %}
                {% include "components/auth_register_form.html" %}
            </div>

        </div>
    </div>
</div>

<script src="{% static 'pages/js/login_register.js' %}?v=3"></script>
</body>
</html>
