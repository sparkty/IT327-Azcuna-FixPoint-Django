<!-- Change Password -->
<div class="profile-section">
    <div class="profile-section-header">
        <span class="profile-section-icon">◉</span>
        <span class="profile-section-title">Change Password</span>
    </div>
    <div class="profile-pw-body">
        <form method="POST" action="{% url 'profile_change_password' %}" id="profile-pw-form" autocomplete="off">
            {% csrf_token %}
            <div class="profile-pw-grid">
                <div class="profile-pw-field">
                    <label class="profile-field-label" for="current-password">CURRENT PASSWORD</label>
                    <div class="profile-pw-wrap">
                        <input type="password" id="current-password" name="current_password"
                               class="profile-input" placeholder="Current password" autocomplete="off">
                        <button type="button" class="profile-pw-toggle" data-target="current-password" aria-label="Show password">Show</button>
                    </div>
                </div>
                <div class="profile-pw-field">
                    <label class="profile-field-label" for="new-password">NEW PASSWORD</label>
                    <div class="profile-pw-wrap">
                        <input type="password" id="new-password" name="new_password"
                               class="profile-input" placeholder="New password (min. 8 chars)" autocomplete="off">
                        <button type="button" class="profile-pw-toggle" data-target="new-password" aria-label="Show password">Show</button>
                    </div>
                </div>
                <div class="profile-pw-field">
                    <label class="profile-field-label" for="confirm-password">CONFIRM NEW PASSWORD</label>
                    <div class="profile-pw-wrap">
                        <input type="password" id="confirm-password" name="confirm_password"
                               class="profile-input" placeholder="Confirm new password" autocomplete="off">
                        <button type="button" class="profile-pw-toggle" data-target="confirm-password" aria-label="Show password">Show</button>
                    </div>
                </div>
            </div>
            <div class="profile-pw-actions">
                <button type="submit" class="btn-sm primary" id="profile-pw-submit">Update Password</button>
            </div>
        </form>
    </div>
</div>
