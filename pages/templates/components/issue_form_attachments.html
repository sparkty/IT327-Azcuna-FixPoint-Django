<div class="form-card">
    <div class="form-card-title">File Attachments</div>
    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">📎</div>
        <div class="upload-text">Drag &amp; drop files here, or click to browse</div>
        <div class="upload-hint">Supports: JPG, PNG, GIF, PDF · Max 10MB per file</div>
    </div>
    <input type="file" id="fileInput" name="attachment" multiple style="display:none"
           accept="image/*,application/pdf" onchange="handleFileUpload(event)" />
    <div class="attachments-list" id="attachmentsList"></div>
</div>
